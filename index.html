<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>薬剤GS1読み取り</title>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
}

video{
width:90%;
max-width:400px;
border:1px solid #ccc;
}

button{
font-size:20px;
padding:10px 20px;
margin:10px;
}

#result{
font-size:20px;
margin-top:20px;
}

</style>

</head>

<body>

<h2>薬剤コード読み取り</h2>

<button onclick="startCamera()">カメラ起動</button>

<br>

<video id="video" autoplay playsinline></video>

<br>

<button onclick="scan()">読み取り</button>

<div id="result"></div>

<script>

let stream

async function startCamera(){

try{

stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
width:{ideal:1280},
height:{ideal:720}
}
})

const video=document.getElementById("video")

video.srcObject=stream

}catch(e){

alert("カメラ起動エラー："+e)

}

}

async function scan(){

const video=document.getElementById("video")

const canvas=document.createElement("canvas")

// OCR範囲（下1/3）
const cropHeight = video.videoHeight * 0.35
const cropY = video.videoHeight * 0.65

// 2倍拡大
canvas.width = video.videoWidth * 2
canvas.height = cropHeight * 2

const ctx = canvas.getContext("2d")

ctx.drawImage(
 video,
 0,
 cropY,
 video.videoWidth,
 cropHeight,
 0,
 0,
 canvas.width,
 canvas.height
)

document.getElementById("result").innerHTML="解析中..."

const {data:{text}} = await Tesseract.recognize(
 canvas,
 "eng",
 {
  tessedit_char_whitelist:"0123456789"
 }
)

console.log(text)

// 数字のみ
const numbers = text.replace(/\D/g,'')

// 14桁検索
const match = numbers.match(/\d{14}/)

if(!match){

document.getElementById("result").innerHTML="14桁コード認識失敗"

return

}

const gtin = match[0]

document.getElementById("result").innerHTML="GTIN："+gtin

sendToGAS(gtin)

}

function sendToGAS(code){

fetch("GAS_WEBAPP_URL",{

method:"POST",

body:JSON.stringify({

code:code,
mode:"use",
qty:1

})

})

.then(r=>r.json())

.then(data=>{

if(data.error){

document.getElementById("result").innerHTML="薬剤未登録"

return

}

document.getElementById("result").innerHTML=

data.drug+"<br>在庫："+data.stock

})

}

</script>

</body>
</html>
