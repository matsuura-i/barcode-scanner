<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>医療バーコードスキャン</title>

<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2/dist/quagga.min.js"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
}

#scanner{
width:100%;
max-width:500px;
margin:auto;
}

button{
font-size:22px;
padding:12px;
margin:10px;
}

</style>

</head>

<body>

<h2>医療在庫スキャン</h2>

<button onclick="startScan('use')">使用</button>
<button onclick="startScan('add')">在庫追加</button>

<div id="scanner"></div>

<h3 id="result">待機中</h3>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw_99iT1QfL-YTr_LM1wHl_BkYpS9dmL7VvSi_P8sD1cPa8h0FswZnTaG9aJMnSZqHfCg/exec"

let mode="use"
let last=""

function beep(){

let ctx=new AudioContext()
let osc=ctx.createOscillator()

osc.connect(ctx.destination)

osc.start()

osc.stop(ctx.currentTime+0.1)

}

function startScan(m){

mode=m

Quagga.init({

inputStream:{
name:"Live",
type:"LiveStream",
target:document.querySelector('#scanner'),
constraints:{
facingMode:"environment",
width:1280,
height:720
}
},

locator:{
patchSize:"large",
halfSample:false
},

decoder:{
readers:[
"code_128_reader",
"ean_reader",
"ean_13_reader",
"upc_reader"
]
},

locate:true

},function(err){

locate:true

},function(err){

if(err){

console.log(err)

return

}

Quagga.start()

})

}

Quagga.onDetected(function(data){

let code=data.codeResult.code

if(code===last) return

last=code

let gtin=code.match(/\d{14}/)

if(gtin) code=gtin[0]

document.getElementById("result").innerText=code

beep()

fetch(GAS_URL+"?gtin="+code+"&mode="+mode)

setTimeout(()=>{
last=""
},1500)

})

</script>

</body>

</html>
