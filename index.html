<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
margin:0;
}

header{
background:#1976d2;
color:white;
padding:15px;
font-size:22px;
}

button{
font-size:20px;
padding:15px;
margin:10px;
}

#scanner{
display:none;
}

#video{
width:100%;
max-width:400px;
}

#result{
font-size:24px;
margin-top:15px;
}

</style>

</head>

<body>

<header>医療在庫アプリ</header>

<div id="menu">

<button onclick="startScan('use')">
使用
</button>

<button onclick="startScan('add')">
在庫追加
</button>

</div>

<div id="scanner">

<div id="video"></div>

<div id="result">スキャン待機</div>

<button onclick="stopScan()">中止</button>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw_99iT1QfL-YTr_LM1wHl_BkYpS9dmL7VvSi_P8sD1cPa8h0FswZnTaG9aJMnSZqHfCg/exec";

let mode="use";

function beep(){

let ctx=new AudioContext();
let osc=ctx.createOscillator();

osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.1);

}

function extractGTIN(code){

if(code.includes("01")){
return code.substring(code.indexOf("01")+2,code.indexOf("01")+16);
}

return code;

}

function startScan(m){

mode=m;

document.getElementById("menu").style.display="none";
document.getElementById("scanner").style.display="block";

Quagga.init({

inputStream:{
type:"LiveStream",
target:document.querySelector('#video'),
constraints:{
facingMode:"environment"
}
},

decoder:{
readers:["code_128_reader"]
}

},function(err){

if(err){
console.log(err);
return;
}

Quagga.start();

});

Quagga.onDetected(function(data){

let raw=data.codeResult.code;

let gtin=extractGTIN(raw);

fetch(
GAS_URL+
"?gtin="+gtin+
"&mode="+mode
)

.then(r=>r.text())
.then(t=>{

document.getElementById("result").innerHTML=t;

beep();

});

});

}

function stopScan(){

Quagga.stop();

document.getElementById("scanner").style.display="none";
document.getElementById("menu").style.display="block";

}

</script>

</body>

</html>
