<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
}

#reader{
width:320px;
margin:auto;
}

button{
font-size:20px;
padding:12px;
margin:10px;
}

</style>

</head>

<body>

<h2>バーコードスキャン</h2>

<button onclick="startScan()">スキャン開始</button>

<div id="reader"></div>

<h3 id="result">待機中</h3>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw_99iT1QfL-YTr_LM1wHl_BkYpS9dmL7VvSi_P8sD1cPa8h0FswZnTaG9aJMnSZqHfCg/exec"

function beep(){

let ctx=new AudioContext()
let osc=ctx.createOscillator()

osc.connect(ctx.destination)

osc.start()

osc.stop(ctx.currentTime+0.1)

}

function startScan(){

const scanner = new Html5Qrcode("reader")

scanner.start(
{ facingMode: "environment" },

{
fps:10,
qrbox:250
},

(code)=>{

document.getElementById("result").innerText=code

beep()

fetch(GAS_URL+"?gtin="+code)

}

)

}

</script>

</body>

</html>
