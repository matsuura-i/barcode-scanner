<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
margin:0;
background:#f2f2f2;
}

header{
background:#1565c0;
color:white;
padding:15px;
font-size:22px;
}

video{
width:100%;
max-width:500px;
}

#frame{

position:absolute;

border:4px solid red;

width:80%;

height:120px;

top:50%;

left:50%;

transform:translate(-50%,-50%);

}

button{

font-size:22px;

padding:15px;

margin:10px;

}

#scanner{

display:none;

position:relative;

}

</style>

</head>

<body>

<header>医療バーコードスキャン</header>

<div id="menu">

<button onclick="startScan('use')">使用</button>

<button onclick="startScan('add')">在庫追加</button>

</div>

<div id="scanner">

<video id="video"></video>

<div id="frame"></div>

<div id="result">スキャン待機</div>

<button onclick="stopScan()">中止</button>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw_99iT1QfL-YTr_LM1wHl_BkYpS9dmL7VvSi_P8sD1cPa8h0FswZnTaG9aJMnSZqHfCg/exec";

let mode="use";

let lastCode="";

let reader=new ZXing.BrowserMultiFormatReader({

delayBetweenScanAttempts:100

});

function beep(){

let ctx=new AudioContext();

let osc=ctx.createOscillator();

osc.connect(ctx.destination);

osc.start();

osc.stop(ctx.currentTime+0.1);

}

function extractGTIN(text){

let match=text.match(/\d{14}/);

if(match){

return match[0];

}

return text;

}

function startScan(m){

mode=m;

document.getElementById("menu").style.display="none";

document.getElementById("scanner").style.display="block";

reader.decodeFromConstraints(

{

video:{

facingMode:"environment",

width:{ideal:1280},

height:{ideal:720}

}

},

"video",

(result,err)=>{

if(result){

let raw=result.text;

if(raw===lastCode){

return;

}

lastCode=raw;

let gtin=extractGTIN(raw);

fetch(

GAS_URL+

"?gtin="+gtin+

"&mode="+mode

)

.then(r=>r.text())

.then(t=>{

document.getElementById("result").innerHTML=t;

beep();

});

setTimeout(()=>{

lastCode="";

},1500);

}

}

);

}

function stopScan(){

reader.reset();

document.getElementById("scanner").style.display="none";

document.getElementById("menu").style.display="block";

}

</script>

</body>

</html>
