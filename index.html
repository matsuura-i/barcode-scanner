<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
}

button{
font-size:22px;
margin:10px;
padding:15px;
}

video{
width:95%;
max-width:400px;
}

</style>

</head>

<body>

<h2>医療在庫管理</h2>

<div id="menu">

<button onclick="startScan('use')">
使用
</button>

<button onclick="startScan('add')">
在庫追加
</button>

</div>

<div id="scanner" style="display:none">

<video id="video"></video>

<h2 id="result">スキャン待機</h2>

<button onclick="stopScan()">中止</button>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw_99iT1QfL-YTr_LM1wHl_BkYpS9dmL7VvSi_P8sD1cPa8h0FswZnTaG9aJMnSZqHfCg/exec";

let mode="use";
let lastCode="";

function beep(){

let ctx=new AudioContext();
let osc=ctx.createOscillator();

osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.1);

}

function extractGTIN(code){

let match = code.match(/\d{14}/);

if(match){
return match[0];
}

return code;

}

let codeReader = new ZXing.BrowserMultiFormatReader();

function startScan(m){

mode=m;

document.getElementById("menu").style.display="none";
document.getElementById("scanner").style.display="block";

codeReader.decodeFromVideoDevice(null,'video',(result,err)=>{

if(result){

let raw=result.text;

if(raw===lastCode){
return;
}

lastCode=raw;

let gtin=extractGTIN(raw);

fetch(
GAS_URL+
"?gtin="+gtin+
"&mode="+mode
)

.then(r=>r.text())
.then(t=>{

document.getElementById("result").innerHTML=t;

beep();

});

setTimeout(()=>{
lastCode="";
},1500);

}

});

}

function stopScan(){

codeReader.reset();

document.getElementById("scanner").style.display="none";
document.getElementById("menu").style.display="block";

}

</script>

</body>

</html>
