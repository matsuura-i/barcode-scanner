<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@latest"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
}

video{
width:95%;
max-width:500px;
}

button{
font-size:22px;
padding:15px;
margin:10px;
}

</style>

</head>

<body>

<h2>医療在庫スキャン</h2>

<button onclick="start('use')">使用</button>
<button onclick="start('add')">在庫追加</button>

<video id="video"></video>

<h3 id="result"></h3>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw_99iT1QfL-YTr_LM1wHl_BkYpS9dmL7VvSi_P8sD1cPa8h0FswZnTaG9aJMnSZqHfCg/exec"

let mode="use"

function beep(){

let ctx=new AudioContext()
let osc=ctx.createOscillator()

osc.connect(ctx.destination)
osc.start()
osc.stop(ctx.currentTime+0.1)

}

function start(m){

mode=m

const codeReader=new ZXing.BrowserMultiFormatReader()

codeReader.decodeFromVideoDevice(null,'video',(result,err)=>{

if(result){

let code=result.text

let gtin=code.match(/\d{14}/)

if(gtin) code=gtin[0]

fetch(GAS_URL+"?gtin="+code+"&mode="+mode)

.then(r=>r.text())
.then(t=>{

document.getElementById("result").innerText=t

beep()

})

}

})

}

</script>

</body>
</html>
