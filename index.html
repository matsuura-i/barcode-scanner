<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@zxing/library@latest"></script>

<style>

body{
font-family:sans-serif;
text-align:center;
margin:0;
}

header{
background:#1976d2;
color:white;
padding:15px;
font-size:22px;
}

button{
font-size:20px;
padding:15px;
margin:10px;
}

video{
width:100%;
max-width:400px;
}

#result{
font-size:24px;
margin-top:15px;
}

#scanner{
display:none;
}

</style>

</head>

<body>

<header>医療在庫アプリ</header>

<div id="menu">

<button onclick="startScan('use')">
使用
</button>

<button onclick="startScan('add')">
在庫追加
</button>

</div>

<div id="scanner">

<video id="video"></video>

<div id="result">スキャン待機</div>

<button onclick="stopScan()">中止</button>

</div>

<script>

const GAS_URL="GAS_URL";

let mode="use";
let reader;

function startScan(m){

mode=m;

document.getElementById("menu").style.display="none";
document.getElementById("scanner").style.display="block";

startCamera();

}

function stopScan(){

reader.reset();

document.getElementById("scanner").style.display="none";
document.getElementById("menu").style.display="block";

}

function beep(){

let ctx=new AudioContext();
let osc=ctx.createOscillator();

osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.1);

}

function extractGTIN(code){

if(code.includes("01")){
return code.substring(
code.indexOf("01")+2,
code.indexOf("01")+16
);
}

return code;

}

function startCamera(){

reader = new ZXing.BrowserMultiFormatReader();

reader.decodeFromVideoDevice(
null,
"video",
(result,err)=>{

if(result){

let raw=result.text;

let gtin=extractGTIN(raw);

fetch(
GAS_URL+
"?gtin="+gtin+
"&mode="+mode
)

.then(r=>r.text())

.then(t=>{

document.getElementById("result").innerHTML=t;

beep();

});

}

});

}

</script>

</body>

</html>
