<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>バーコードスキャン</title>

<style>

body{
font-family:sans-serif;
text-align:center;
}

video{
width:95%;
max-width:500px;
border:2px solid #333;
}

button{
font-size:22px;
padding:12px;
margin:10px;
}

</style>

</head>

<body>

<h2>医療バーコードスキャン</h2>

<button onclick="startCamera()">カメラ開始</button>

<br>

<video id="video" autoplay playsinline></video>

<h3 id="status">待機中</h3>

<script>

let stream = null

async function startCamera(){

try{

stream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment"
},
audio:false
})

const video = document.getElementById("video")

video.srcObject = stream

document.getElementById("status").innerText = "カメラ起動OK"

}catch(err){

document.getElementById("status").innerText = "カメラ起動失敗"

console.log(err)

}

}

</script>

</body>
</html>
