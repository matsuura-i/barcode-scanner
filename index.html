<!DOCTYPE html>
<html>
<head>

<script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>

</head>

<body>

<h2>薬剤OCR読み取り</h2>

<video id="video" width="300" autoplay></video>

<br><br>

<button onclick="scan()">読み取り</button>

<br><br>

結果
<div id="result"></div>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbw_99iT1QfL-YTr_LM1wHl_BkYpS9dmL7VvSi_P8sD1cPa8h0FswZnTaG9aJMnSZqHfCg/exec";

navigator.mediaDevices.getUserMedia({
  video: { facingMode: "environment" }
})
.then(stream => {

  document.getElementById("video").srcObject = stream;

});

function scan(){

  const video = document.getElementById("video");

  const canvas = document.createElement("canvas");

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  const ctx = canvas.getContext("2d");

  ctx.drawImage(video,0,0);

  Tesseract.recognize(
    canvas,
    'eng',
    {
      tessedit_char_whitelist: '0123456789'
    }
  ).then(({data:{text}})=>{

    const code = text.replace(/\D/g,'');

    if(code.length < 14){

      alert("コード認識失敗");

      return;
    }

    const gtin = code.substring(0,14);

    updateStock(gtin);

  });

}

function updateStock(code){

fetch(GAS_URL,{
method:"POST",
body:JSON.stringify({
code:code,
mode:"use",
qty:1
})
})
.then(r=>r.json())
.then(data=>{

document.getElementById("result").innerHTML =
data.drug + "<br>在庫：" + data.stock;

});

}

</script>

</body>
</html>
