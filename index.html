<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
font-family:sans-serif;
text-align:center;
margin:0;
}

header{
background:#1976d2;
color:white;
padding:15px;
font-size:22px;
}

video{
width:95%;
max-width:500px;
}

button{
font-size:22px;
margin:10px;
padding:15px;
}

#scanner{
display:none;
}

</style>

</head>

<body>

<header>医療在庫スキャン</header>

<div id="menu">

<button onclick="startScan('use')">
使用
</button>

<button onclick="startScan('add')">
在庫追加
</button>

</div>

<div id="scanner">

<video id="video" autoplay></video>

<h2 id="result">スキャン待機</h2>

<button onclick="stopScan()">中止</button>

</div>

<script>

const GAS_URL="https://script.google.com/macros/s/AKfycbw_99iT1QfL-YTr_LM1wHl_BkYpS9dmL7VvSi_P8sD1cPa8h0FswZnTaG9aJMnSZqHfCg/exec";

let mode="use";
let scanning=false;

const barcodeDetector =
new BarcodeDetector({
formats:["code_128","ean_13","ean_8"]
});

function beep(){

let ctx=new AudioContext();
let osc=ctx.createOscillator();

osc.connect(ctx.destination);
osc.start();
osc.stop(ctx.currentTime+0.1);

}

function extractGTIN(text){

let match=text.match(/\d{14}/);

if(match){
return match[0];
}

return text;

}

async function startScan(m){

mode=m;

document.getElementById("menu").style.display="none";
document.getElementById("scanner").style.display="block";

const stream = await navigator.mediaDevices.getUserMedia({
video:{facingMode:"environment"}
});

const video=document.getElementById("video");

video.srcObject=stream;

scanning=true;

scanLoop(video);

}

async function scanLoop(video){

if(!scanning)return;

const barcodes =
await barcodeDetector.detect(video);

if(barcodes.length>0){

let raw=barcodes[0].rawValue;

let gtin=extractGTIN(raw);

fetch(
GAS_URL+
"?gtin="+gtin+
"&mode="+mode
)

.then(r=>r.text())
.then(t=>{

document.getElementById("result").innerHTML=t;

beep();

});

await new Promise(r=>setTimeout(r,1500));

}

requestAnimationFrame(()=>scanLoop(video));

}

function stopScan(){

scanning=false;

location.reload();

}

</script>

</body>

</html>
